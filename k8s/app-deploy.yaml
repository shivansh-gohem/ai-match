# ═══════════════════════════════════════
# DevConnect App — Kubernetes Deployment
# Deploys Go app to local 'kind' cluster
# ═══════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devconnect-app
  labels:
    app: devconnect
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devconnect
  template:
    metadata:
      labels:
        app: devconnect
    spec:
      containers:
        - name: devconnect
          image: devconnect:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DB_TYPE
              value: "fake"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devconnect-secrets
                  key: gemini-api-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: devconnect-svc
  labels:
    app: devconnect
spec:
  type: NodePort
  selector:
    app: devconnect
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
---
# Optional: Secret for Gemini API Key
apiVersion: v1
kind: Secret
metadata:
  name: devconnect-secrets
type: Opaque
stringData:
  gemini-api-key: "your-gemini-api-key-here"
