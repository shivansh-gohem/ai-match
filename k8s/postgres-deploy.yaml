# ═══════════════════════════════════════════
# PostgreSQL + pgvector — Kubernetes Deployment
# For future use (MVP uses fake in-memory DB)
# ═══════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: devconnect
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devconnect-db
  template:
    metadata:
      labels:
        app: devconnect-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: devconnect
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: password
            - name: POSTGRES_DB
              value: devconnect_db
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  labels:
    app: devconnect
    component: database
spec:
  type: ClusterIP
  selector:
    app: devconnect-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
type: Opaque
stringData:
  password: "devconnect-super-secret-2024"
